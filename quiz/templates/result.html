<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-12">
    <div class="max-w-2xl mx-auto bg-white shadow-2xl rounded-2xl p-10">
        <div class="text-center">
            <h1 class="text-4xl font-bold text-green-600 mb-4">Quiz Completed!</h1>
            <p class="text-2xl mb-8">Your Score: <strong>{{ attempt.score }} / {{ attempt.quiz.total_marks }}</strong></p>
        </div>

        <div class="mt-10">
            <a href="/" 
               class="block text-center bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-xl font-semibold">
                Back to Home
            </a>
        </div>
    </div>
</body>
</html>
